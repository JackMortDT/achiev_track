# fly.toml app configuration file generated for achievtrack-api on 2026-06-16T21:52:49-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'achievtrack-api'
primary_region = 'lax'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/achiev_track eval "AchievTrack.Release.migrate()"'

[env]
  PHX_HOST = 'achievtrack-api.fly.dev'
  PHX_SERVER = 'true'
  POOL_SIZE = '10'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
